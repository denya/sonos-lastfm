name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uvx ruff check src/sonos_lastfm/
      - run: uvx ruff format --check src/sonos_lastfm/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}
      - name: Install system dependencies (lxml build for Python 3.14)
        if: matrix.python-version == '3.14'
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxslt-dev
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --group dev --python ${{ matrix.python-version }} pytest tests/ -v
